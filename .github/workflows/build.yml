name: Build noxssh

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release

      - name: Verify daemon binary
        shell: bash
        run: |
          set -euo pipefail
          test -f bin/noxssh
          test -f bin/noxsshd || test -f bin/noxsshd.exe

      - name: CTest
        if: runner.os != 'Windows'
        run: cd build && ctest --output-on-failure

      - name: CTest (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cd build; ctest -C Release --output-on-failure

      - name: Smoke noxsshd (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/ci_smoke_sshd.sh

      - name: Smoke noxsshd (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/ci_smoke_sshd.ps1

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: noxssh-${{ runner.os }}
          path: bin/**
          if-no-files-found: error
